# App runs on port 8080
server.port=8080

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:financedb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA auto-creates tables from your Java classes
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 browser console (useful for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Allow requests from the .NET frontend
spring.web.cors.allowed-origins=http://localhost:5000
